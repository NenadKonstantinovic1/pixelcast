<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="assets/style.css"/>
	<title>PixelCast</title>
	<link rel="icon" type="image/png" href="assets/images/icon.png">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<script src="https://kit.fontawesome.com/1b32e1e255.js" crossorigin="anonymous"></script>
</head>
<body>
	<nav class="navbar navbar-expand-lg navbar-dark">
		<div class="container-fluid">
			<a class="navbar-brand text-white" href="index.html">
				<h1 id="logo">PixelCast</h1>
			</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" 
				aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarSupportedContent">
				<ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <!-- Navigation bar links --> 
				</ul>
			</div>
		</div>
	</nav>
	<div class="container-fluid header-2">
		<h2>Got any questions about the consoles? <br/><span class="bolded-text">Please fill in the contact form below.</span></h2>
	</div>
	<div class="main container-fluid">
		<div class="container-fluid pt-2 pb-4">
			<div class="row justify-content-center">
				<div class="col-12 col-md-8 col-lg-6">
					<div class="contact-form-container p-4 rounded scroll-reveal">
						<h3 class="text-white text-center mb-4 bolded-text">Contact Us</h3>
						<form id="contactForm">
							<div class="mb-3">
								<label for="firstName" class="form-label text-white">First Name <span class="text-danger">*</span></label>
								<input type="text" class="form-control contact-input" id="firstName" name="firstName" required placeholder="Letters, spaces, hyphens and apostrophes only (2-50 characters)">
							</div>
							<div class="mb-3">
								<label for="lastName" class="form-label text-white">Last Name <span class="text-danger">*</span></label>
								<input type="text" class="form-control contact-input" id="lastName" name="lastName" required placeholder="Letters, spaces, hyphens and apostrophes only (2-50 characters)">
							</div>
							<div class="mb-3">
								<label for="email" class="form-label text-white">Email <span class="text-danger">*</span></label>
								<input type="email" class="form-control contact-input" id="email" name="email" required placeholder="example@domain.com">
							</div>
							<div class="mb-3">
								<label for="contactReason" class="form-label text-white">Reason for Contact <span class="text-danger">*</span></label>
								<select class="form-select contact-input" id="contactReason" name="contactReason" required>
									<option value="" disabled selected>Select a reason...</option>
									<option value="question">Question</option>
									<option value="request">Request</option>
									<option value="feedback">Feedback</option>
								</select>
							</div>
							<div class="mb-3">
								<label for="message" class="form-label text-white">Message <span class="text-danger">*</span></label>
								<textarea class="form-control contact-input" id="message" name="message" rows="5" required placeholder="Please provide more details about your question, request, or feedback..."></textarea>
							</div>
							<div id="formMessage" class="form-message mb-3 form-message-hidden">
								<p class="mb-0"></p>
							</div>
							<div class="text-center">
								<button type="submit" class="btn btn-outline-light contact-submit-btn">Submit</button>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>
	<footer class="text-center text-lg-start text-white">
		<div class="d-flex flex-column align-items-center p-4 border-bottom">
			<div class="mb-3 text-center">
				<span class="bolded-text fs-4 text-uppercase">Where to find us:</span>
			</div>
			<div class="icons text-center">
                <!-- Social media icons -->
			</div>
		</div>
		<div class="footer-links-section">
			<div class="container text-center text-md-start mt-5">
				<div class="row mt-3">
					<div class="col-md-2 col-lg-2 col-xl-2 mx-auto mb-4">
						<h6 class="text-uppercase fw-bold mb-4">
							Console brands
						</h6>
						<div class="footer-brands-links">
							<!-- Brand links -->
						</div>
					</div>
					<div class="col-md-3 col-lg-2 col-xl-2 mx-auto mb-4">
						<h6 class="text-uppercase fw-bold mb-4">
							Navigation links
						</h6>
						<div class="footer-navigation-links">
							<!-- Navigation links -->
						</div>
					</div>
					<div class="col-md-4 col-lg-3 col-xl-3 mx-auto mb-md-0 mb-4">
						<h6 class="text-uppercase fw-bold mb-4">Contact</h6>
						<p><i class="fas fa-home me-3"></i> Kralja Milana 15, Belgrade 11000, Serbia</p>
						<p>
							<i class="fas fa-envelope me-3"></i>
							pixelcast-support@gmail.com
						</p>
						<p><i class="fas fa-phone me-3"></i> +381 64 123 4567</p>
					</div>
				</div>
			</div>
		</div>
		<div class="text-center p-4">
			<p class="text-white">
				<span class="bolded-text">
					&copy; Nenad Konstantinović 80/24
				</span>
			</p>
		</div>
	</footer>
	<button id="backToTop" class="back-to-top-btn" aria-label="Back to top">
		<i class="fas fa-arrow-up"></i>
	</button>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
	<script src="assets/main.js" type="text/javascript"></script>
</body>
</html>
